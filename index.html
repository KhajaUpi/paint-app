<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCanvas Pro | Studio</title>
    
    <link rel="icon" type="image/png" href="Favicon.png">

    <script src="touch-support.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="edge-glow top"></div>
    <div class="edge-glow bottom"></div>
    <div class="edge-glow left"></div>
    <div class="edge-glow right"></div>

    <div id="startScreen" class="overlay">
        <div class="modal slide-in-top">
            <div class="brand">
                <i class="fa-solid fa-wand-magic-sparkles magic-pulse"></i>
                <h1 class="gradient-text">AETHER CANVAS</h1>
                <p class="subtitle">ELITE STUDIO ENGINE</p>
            </div>
            
            <div class="setup-form">
                <div class="field">
                    <label>Project Name</label>
                    <input type="text" id="fileNameInput" placeholder="My Masterpiece">
                </div>
                
                <div class="row">
                    <div class="field">
                        <label>Base Color</label>
                        <input type="color" id="startBgPicker" value="#00ffff">
                    </div>
                    <div class="field">
                        <label>Import Image</label>
                        <label class="file-upload">
                            <i class="fa-solid fa-image"></i> Choose
                            <input type="file" id="bgUpload" accept="image/*">
                        </label>
                    </div>
                </div>
            </div>
            
            <button id="startBtn" class="launch-btn">Launch Studio</button>
        </div>
    </div>

    <div class="viewport">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="bgCanvas"></canvas>
            <canvas id="mainCanvas"></canvas>
            <canvas id="tempCanvas"></canvas>
            <div id="textOverlay"></div>
        </div>
    </div>

    <div id="expandTrigger" class="floating-trigger"><i class="fa-solid fa-plus"></i></div>

    <div class="mac-dock-container">
        <div class="mac-dock dock-entrance">
            <div class="section">
                <div class="color-wrap"><input type="color" id="colorPicker" value="#ffffff"></div>
                <button id="brushBtn" class="dock-btn active" title="Brush"><i class="fa-solid fa-paintbrush"></i></button>
                <button id="eraserBtn" class="dock-btn" title="Eraser"><i class="fa-solid fa-eraser"></i></button>
                <button id="fillBtn" class="dock-btn" title="Paint Bucket"><i class="fa-solid fa-fill-drip"></i></button>
                <button id="textBtn" class="dock-btn" title="Text Tool"><i class="fa-solid fa-font"></i></button>
            </div>
            
            <div class="divider"></div>
            
            <div class="section slider-section">
                <div id="brushPreview"></div>
                <input type="range" id="sizeSlider" min="1" max="100" value="15">
            </div>
            
            <div class="divider"></div>
            
            <div class="section">
                <button id="undoBtn" class="dock-btn" title="Undo (Ctrl+Z)"><i class="fa-solid fa-rotate-left"></i></button>
                <button id="saveBtn" class="dock-btn" title="Save Project"><i class="fa-solid fa-download"></i></button>
                <button id="minimizeBtn" class="dock-btn" title="Minimize Bar"><i class="fa-solid fa-compress"></i></button>
                <button id="exitBtn" class="dock-btn exit" title="Reload"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </div>
    <script src="touch-handler.js"></script>
    <script src="script.js"></script>
</body>
</html>
