<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Studio Paint Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="startScreen" class="overlay">
        <div class="modal fluent-appear">
            <h1 class="logo-text">Studio Paint Pro</h1>
            <div class="setup-form">
                <div class="input-group">
                    <label>Project Name</label>
                    <input type="text" id="projectName" placeholder="Untitled Artwork" spellcheck="false" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Canvas Background</label>
                    <div class="color-picker-box">
                        <input type="color" id="bgPicker" value="#ffffff">
                        <span>Background Color</span>
                    </div>
                </div>
            </div>
            <button id="launchBtn" class="primary-btn">Start Creating</button>
        </div>
    </div>

    <div id="brush-preview"></div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="brushMenu" class="brush-menu hidden">
        <div class="brush-opt active" data-brush="brush"><span>Brush</span><div class="sig s-normal"></div></div>
        <div class="brush-opt" data-brush="calligraphy"><span>Calligraphy</span><div class="sig s-calli"></div></div>
        <div class="brush-opt" data-brush="airbrush"><span>Airbrush</span><div class="sig s-air"></div></div>
        <div class="brush-opt" data-brush="oil"><span>Oil Brush</span><div class="sig s-oil"></div></div>
        <div class="brush-opt" data-brush="crayon"><span>Crayon</span><div class="sig s-crayon"></div></div>
        <div class="brush-opt" data-brush="pencil"><span>Natural Pencil</span><div class="sig s-pencil"></div></div>
    </div>

    <div id="minimizedTrigger" class="magic-trigger hidden">✨</div>

    <div class="dock-container" id="dockContainer">
        <div class="glass-dock">
            <div class="dock-config">
                <input type="color" id="colorPicker" value="#6366f1">
                <div class="slider-wrapper">
                    <input type="range" id="lineWidth" min="1" max="100" value="15">
                </div>
            </div>
            <div class="sep"></div>
            
            <button class="dock-item active" id="penBtn" aria-label="Brushes">
                <img src="https://img.icons8.com/fluency/96/paint-brush.png">
            </button>
            <button class="dock-item" id="eraserBtn" aria-label="Eraser">
                <img src="https://img.icons8.com/fluency/96/eraser.png">
            </button>
            <button class="dock-item" id="pickerBtn" aria-label="Color Picker">
                <img src="https://img.icons8.com/fluency/96/color-dropper.png">
            </button>
            
            <div class="sep"></div>
            
            <button class="dock-item" id="undoBtn" aria-label="Undo">
                <img src="https://img.icons8.com/fluency/96/undo.png">
            </button>
            <button class="dock-item" id="saveBtn" aria-label="Save">
                <img src="https://img.icons8.com/fluency/96/save-as.png">
            </button>
            
            <div class="sep"></div>
            
            <button class="dock-item" id="minimizeBtn" aria-label="Minimize">
                <img src="https://img.icons8.com/fluency/96/collapse-arrow.png">
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
